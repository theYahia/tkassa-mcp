startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - TKASSA_TERMINAL_KEY
      - TKASSA_PASSWORD
    properties:
      TKASSA_TERMINAL_KEY:
        type: string
        title: "T-Kassa Terminal Key"
        description: "Terminal key for T-Kassa (Tinkoff) payment API. Get it from your T-Kassa merchant dashboard → Terminal settings."
      TKASSA_PASSWORD:
        type: string
        title: "T-Kassa Password"
        description: "Password for T-Kassa (Tinkoff) payment API. Get it from your T-Kassa merchant dashboard → Terminal settings."
  commandFunction:
    |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@theyahia/tkassa-mcp'],
      env: {
        ...config
      }
    })
